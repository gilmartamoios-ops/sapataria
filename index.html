<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSFF | Simulador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #080808; color: white; }
        .prosff-card { background: #121212; border: 1px solid #222; transition: all 0.3s ease; }
        .gold-text { color: #ffcc00; }
        .green-text { color: #00ff88; }
        input[type=range] { accent-color: #00ff88; }
        .ritmo-btn.active { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); color: #00ff88; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto">
        <header class="text-center my-8">
            <h1 class="text-4xl font-900 gold-text tracking-tighter">ProSFF</h1>
        </header>

        <div class="prosff-card rounded-3xl p-4 mb-6 text-center border-dashed border-green-500/30">
            <span class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Base de Consumo Fixa</span>
            <span class="text-2xl font-black green-text">R$ 300,00</span>
        </div>

        <div class="prosff-card rounded-3xl p-6 mb-6 text-center">
            <h2 class="text-sm font-bold mb-3 uppercase tracking-tight">Construção por Células 1 consumidor + 3 consumidores</h2>
            <p class="text-[11px] text-gray-400 leading-relaxed font-medium">"Não é sobre tempo, é sobre o tamanho do seu passo, decida qual ritmo você quer para seu negócio"</p>
        </div>

        <div class="prosff-card rounded-3xl p-6 mb-6">
            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-4 text-center">Ritmo de duplicação do seu negócio</label>
            <div class="grid grid-cols-3 gap-2 mb-8">
                <button onclick="setRitmo(60, this)" class="ritmo-btn p-3 rounded-xl border border-gray-800 text-[9px] font-black uppercase transition-all">Conservador<br><span class="text-gray-500 font-normal">2 meses</span></button>
                <button onclick="setRitmo(30, this)" class="ritmo-btn active p-3 rounded-xl border border-gray-800 text-[9px] font-black uppercase transition-all">Moderado<br><span class="text-gray-500 font-normal">1 mês</span></button>
                <button onclick="setRitmo(15, this)" class="ritmo-btn p-3 rounded-xl border border-gray-800 text-[9px] font-black uppercase transition-all">Acelerado<br><span class="text-gray-500 font-normal">15 dias</span></button>
            </div>

            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2 text-center">níveis abaixo de duplicação de células de consumidores: <span id="etapas-val" class="green-text text-sm">5</span></label>
            <input type="range" id="etapas" min="1" max="8" value="5" class="w-full mb-2" oninput="simular()">
        </div>

        <div id="lista-etapas" class="space-y-4">
            </div>

        <div class="mt-10 p-6 border-t border-gray-900 text-[10px] text-gray-600 text-center space-y-2 uppercase font-bold tracking-tight">
            <p>Protocolo ProSFF - Baseado nas regras de bonificação vigentes.</p>
            <p class="text-gray-800 italic">"O sapato só serve se você der o passo."</p>
        </div>
    </div>

    <script>
        let ritmoDias = 30;
        const VALOR_FIXO = 300;

        function setRitmo(dias, btn) {
            ritmoDias = dias;
            document.querySelectorAll('.ritmo-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            simular();
        }

        function simular() {
            const numEtapas = parseInt(document.getElementById('etapas').value);
            document.getElementById('etapas-val').innerText = numEtapas;

            const tiers = [
                { pts: 950, pin: 100, vme: 0.5 }, { pts: 2450, pin: 200, vme: 0.5 },
                { pts: 7250, pin: 700, vme: 0.4 }, { pts: 14750, pin: 1300, vme: 0.4 },
                { pts: 27500, pin: 4000, vme: 0.4 }, { pts: 60000, pin: 12000, vme: 0.4 },
                { pts: 122500, pin: 24000, vme: 0.4 }, { pts: 247500, pin: 34000, vme: 0.35 }
            ];

            const container = document.getElementById('lista-etapas');
            container.innerHTML = '';

            let redeAcumulada = 0;
            let ptsAnterior = 0;

            for (let e = 1; e <= numEtapas; e++) {
                let novosNoNivel = Math.pow(3, e);
                redeAcumulada += novosNoNivel;
                
                let faturamento = redeAcumulada * VALOR_FIXO;
                let ptsMensal = faturamento / 3;

                // Cálculo Unilevel
                let unilevel = 0;
                for (let g = 1; g <= e; g++) {
                    let perc = (g <= 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
                    unilevel += Math.pow(3, g) * VALOR_FIXO * perc;
                }

                // Bônus 3D
                let bonus3D = (ptsMensal > ptsAnterior && ptsMensal <= 27500) ? ptsAnterior : 0;
                let ptsCarreira = ptsMensal + bonus3D;

                // Carreira
                let pinBonus = 0;
                let ptsPorLinha = ptsCarreira / 3;
                for (let t of tiers) {
                    let ptsValidos = 3 * Math.min(ptsPorLinha, t.pts * t.vme);
                    if (ptsValidos >= t.pts) pinBonus = t.pin;
                }

                const totalGanhos = unilevel + pinBonus;
                
                // Cálculo de Tempo em Meses
                let estimativaMeses = (e * ritmoDias) / 30;
                let tempoTexto = estimativaMeses === 0.5 ? "15 dias" : 
                                 estimativaMeses === 1 ? "1 mês" : 
                                 estimativaMeses + " meses";

                container.innerHTML += `
                    <div class="prosff-card rounded-2xl p-5 flex justify-between items-center border-l-4 ${e === numEtapas ? 'border-l-green-500' : 'border-l-gray-800'}">
                        <div class="text-left">
                            <span class="text-[10px] font-black text-gray-500 uppercase">Etapa ${e}</span>
                            <h3 class="text-sm font-bold text-white">${redeAcumulada} Consumidores</h3>
                            <p class="text-xs text-gray-400 font-bold uppercase mt-1">± ${tempoTexto}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-gray-500 block uppercase">Ganho Estimado</span>
                            <span class="text-xl font-black green-text">R$ ${Math.floor(totalGanhos).toLocaleString('pt-BR')}</span>
                        </div>
                    </div>
                `;
                ptsAnterior = ptsMensal;
            }
        }

        simular();
    </script>
</body>
</html>
