<script>
function simular() {
    try {

        const numEtapas = parseInt(document.getElementById('etapas').value);
        document.getElementById('etapas-val').innerText = numEtapas;

        const tiers = [
            { pts: 950, pin: 100, vme: 0.5 },
            { pts: 2450, pin: 200, vme: 0.5 },
            { pts: 7250, pin: 700, vme: 0.4 },
            { pts: 14750, pin: 1300, vme: 0.4 },
            { pts: 27500, pin: 4000, vme: 0.4 },
            { pts: 60000, pin: 12000, vme: 0.4 },
            { pts: 122500, pin: 24000, vme: 0.4 },
            { pts: 247500, pin: 34000, vme: 0.35 }
        ];

        const container = document.getElementById('lista-etapas');
        container.innerHTML = '';

        let redeAcumulada = 0;
        let ptsAnterior = 0;

        function getStatus(etapa) {
            if (etapa === 1) return "Começo consciente";
            if (etapa === 2) return "Primeira duplicação";
            if (etapa === 3) return "Estrutura em formação";
            if (etapa === 4) return "Rede consistente";
            return "Escala em construção";
        }

        function getAcao(etapa) {
            if (etapa === 1) return "Convide 3 pessoas";
            if (etapa === 2) return "Ajude seus 3 a duplicarem";
            if (etapa === 3) return "Acompanhe sua rede";
            return "Desenvolva novos líderes";
        }

        for (let e = 1; e <= numEtapas; e++) {

            let novosNoNivel = Math.pow(3, e);
            redeAcumulada += novosNoNivel;

            let faturamento = redeAcumulada * VALOR_FIXO;
            let ptsMensal = faturamento / 3;

            // UNILEVEL
            let unilevel = 0;
            for (let g = 1; g <= e; g++) {
                let perc = (g <= 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
                unilevel += Math.pow(3, g) * VALOR_FIXO * perc;
            }

            // BONUS 3D
            let bonus3D = (ptsMensal > ptsAnterior && ptsMensal <= 27500) ? ptsAnterior : 0;
            let ptsCarreira = ptsMensal + bonus3D;

            // PIN
            let pinBonus = 0;
            let ptsPorLinha = ptsCarreira / 3;

            for (let t of tiers) {
                let ptsValidos = 3 * Math.min(ptsPorLinha, t.pts * t.vme);
                if (ptsValidos >= t.pts) {
                    pinBonus = t.pin;
                }
            }

            let totalGanhos = unilevel + pinBonus;

            let status = getStatus(e);
            let acao = getAcao(e);

            container.innerHTML += `
                <div class="prosff-card rounded-2xl p-5 border-l-4 ${e === numEtapas ? 'border-l-green-500' : 'border-l-gray-800'}">

                    <div class="flex justify-between">
                        <div>
                            <p class="text-[10px] text-gray-500 uppercase">Etapa ${e}</p>
                            <h3 class="text-sm font-bold">${redeAcumulada} consumidores</h3>
                            <p class="text-[10px] text-green-400">${status}</p>
                        </div>

                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 uppercase">Potencial</p>
                            <p class="text-lg font-black green-text">
                                R$ ${Math.floor(totalGanhos).toLocaleString('pt-BR')}
                            </p>
                        </div>
                    </div>

                    <div class="mt-3 border-t border-gray-800 pt-3">
                        <p class="text-[10px] text-gray-400 uppercase">Próximo passo</p>
                        <p class="text-xs">${acao}</p>
                    </div>

                </div>
            `;

            ptsAnterior = ptsMensal;
        }

        container.innerHTML += `
            <div class="prosff-card rounded-2xl p-6 text-center border border-green-500/30 mt-6">

                <p class="text-xs text-gray-400 uppercase mb-2">
                Próximo passo real
                </p>

                <h3 class="text-lg font-black green-text mb-3">
                Começar sua primeira célula
                </h3>

                <button class="bg-green-500 text-black font-bold px-4 py-2 rounded-xl">
                Entrar na Comunidade
                </button>

                <p class="text-[10px] text-gray-600 mt-4">
                Este simulador mostra cenários de construção.
                O ritmo depende de cada pessoa.
                </p>

            </div>
        `;

    } catch (erro) {
        console.error("Erro:", erro);
    }
}
</script>
