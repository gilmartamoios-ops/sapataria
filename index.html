<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProSFF | Simulador</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background-color: #080808;
    color: white;
}

.prosff-card {
    background: #121212;
    border: 1px solid #222;
}

.gold-text { color: #ffcc00; }
.green-text { color: #00ff88; }

input[type=range] {
    accent-color: #00ff88;
}

.ritmo-btn.active {
    border-color: #00ff88;
    background: rgba(0,255,136,0.1);
    color: #00ff88;
}
</style>
</head>

<body class="p-4 pb-20">

<div class="max-w-md mx-auto">

<header class="text-center my-8">
<h1 class="text-4xl font-black gold-text">ProSFF</h1>
<p class="text-xs text-gray-500 mt-2 uppercase">
Simulador de construção por células
</p>
</header>

<div class="prosff-card rounded-3xl p-4 mb-6 text-center border-dashed border-green-500/30">
<span class="text-[10px] text-gray-500 uppercase block mb-1">
Consumo base mensal
</span>
<span class="text-2xl font-black green-text">R$ 300</span>
</div>

<div class="prosff-card rounded-3xl p-6 mb-6 text-center">
<p class="text-xs text-gray-400">
No ProSFF o crescimento acontece por duplicação de consumidores.
<br><br>
<strong class="text-white">Não é sobre tempo. É sobre construção.</strong>
</p>
</div>

<div class="prosff-card rounded-3xl p-6 mb-6">

<label class="block text-[10px] text-gray-500 uppercase mb-4 text-center">
Ritmo de construção
</label>

<div class="grid grid-cols-3 gap-2 mb-6">

<button onclick="setRitmo(60, this)" class="ritmo-btn p-3 rounded-xl border border-gray-800 text-[9px] font-bold">
Conservador
</button>

<button onclick="setRitmo(30, this)" class="ritmo-btn active p-3 rounded-xl border border-gray-800 text-[9px] font-bold">
Moderado
</button>

<button onclick="setRitmo(15, this)" class="ritmo-btn p-3 rounded-xl border border-gray-800 text-[9px] font-bold">
Acelerado
</button>

</div>

<label class="block text-[10px] text-gray-500 uppercase mb-2 text-center">
Etapas: <span id="etapas-val" class="green-text">5</span>
</label>

<input type="range" id="etapas" min="1" max="8" value="5"
class="w-full"
oninput="simular()">

</div>

<div id="lista-etapas" class="space-y-4"></div>

</div>

<script>

let ritmoDias = 30;
const VALOR_FIXO = 300;

function setRitmo(dias, btn) {
    ritmoDias = dias;
    document.querySelectorAll('.ritmo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    simular();
}

function getStatus(etapa) {
    if (etapa === 1) return "Começo consciente";
    if (etapa === 2) return "Primeira duplicação";
    if (etapa === 3) return "Estrutura em formação";
    if (etapa === 4) return "Rede consistente";
    return "Escala em construção";
}

function getAcao(etapa) {
    if (etapa === 1) return "Convide 3 pessoas";
    if (etapa === 2) return "Ajude seus 3 a duplicarem";
    if (etapa === 3) return "Acompanhe sua rede";
    return "Desenvolva novos líderes";
}

function simular() {

    const numEtapas = parseInt(document.getElementById('etapas').value);
    document.getElementById('etapas-val').innerText = numEtapas;

    const container = document.getElementById('lista-etapas');
    container.innerHTML = '';

    let rede = 0;

    for (let e = 1; e <= numEtapas; e++) {

        let novos = Math.pow(3, e);
        rede += novos;

        let faturamento = rede * VALOR_FIXO;
        let ganho = faturamento * 0.15;

        let status = getStatus(e);
        let acao = getAcao(e);

        container.innerHTML += `
        <div class="prosff-card rounded-2xl p-5 border-l-4 ${e === numEtapas ? 'border-l-green-500' : 'border-l-gray-800'}">

            <div class="flex justify-between">

                <div>
                    <p class="text-[10px] text-gray-500 uppercase">Etapa ${e}</p>
                    <h3 class="text-sm font-bold">${rede} consumidores</h3>
                    <p class="text-[10px] text-green-400">${status}</p>
                </div>

                <div class="text-right">
                    <p class="text-[10px] text-gray-500 uppercase">Potencial</p>
                    <p class="text-lg font-black green-text">
                        R$ ${Math.floor(ganho).toLocaleString('pt-BR')}
                    </p>
                </div>

            </div>

            <div class="mt-3 border-t border-gray-800 pt-3">
                <p class="text-[10px] text-gray-400 uppercase">Próximo passo</p>
                <p class="text-xs">${acao}</p>
            </div>

        </div>
        `;
    }

    container.innerHTML += `
    <div class="prosff-card rounded-2xl p-6 text-center border border-green-500/30">

        <p class="text-xs text-gray-400 uppercase mb-2">
        Próximo passo real
        </p>

        <h3 class="text-lg font-black green-text mb-3">
        Começar sua primeira célula
        </h3>

        <button class="bg-green-500 text-black font-bold px-4 py-2 rounded-xl">
        Entrar na Comunidade
        </button>

        <p class="text-[10px] text-gray-600 mt-4">
        Este simulador mostra cenários de construção.
        O ritmo depende de cada pessoa.
        </p>

    </div>
    `;
}

simular();

</script>

</body>
</html>
