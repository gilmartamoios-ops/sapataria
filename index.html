<script>
    let ritmoDias = 30;
    const VALOR_FIXO = 300;

    function setRitmo(dias, btn) {
        ritmoDias = dias;
        document.querySelectorAll('.ritmo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        simular();
    }

    function getStatus(etapa) {
        if (etapa === 1) return "Começo consciente";
        if (etapa === 2) return "Primeira duplicação";
        if (etapa === 3) return "Estrutura em formação";
        if (etapa === 4) return "Rede consistente";
        if (etapa >= 5) return "Escala em construção";
    }

    function getAcao(etapa) {
        if (etapa === 1) return "Convide 3 pessoas para a comunidade";
        if (etapa === 2) return "Ajude seus 3 consumidores a duplicarem";
        if (etapa === 3) return "Acompanhe sua rede semanalmente";
        if (etapa >= 4) return "Desenvolva novos consultores";
    }

    function simular() {
        const numEtapas = parseInt(document.getElementById('etapas').value);
        document.getElementById('etapas-val').innerText = numEtapas;

        const tiers = [
            { pts: 950, pin: 100, vme: 0.5 }, { pts: 2450, pin: 200, vme: 0.5 },
            { pts: 7250, pin: 700, vme: 0.4 }, { pts: 14750, pin: 1300, vme: 0.4 },
            { pts: 27500, pin: 4000, vme: 0.4 }, { pts: 60000, pin: 12000, vme: 0.4 },
            { pts: 122500, pin: 24000, vme: 0.4 }, { pts: 247500, pin: 34000, vme: 0.35 }
        ];

        const container = document.getElementById('lista-etapas');
        container.innerHTML = '';

        let redeAcumulada = 0;
        let ptsAnterior = 0;

        for (let e = 1; e <= numEtapas; e++) {

            let novosNoNivel = Math.pow(3, e);
            redeAcumulada += novosNoNivel;

            let faturamento = redeAcumulada * VALOR_FIXO;
            let ptsMensal = faturamento / 3;

            let unilevel = 0;
            for (let g = 1; g <= e; g++) {
                let perc = (g <= 2) ? 0.05 : (g === 3 ? 0.09 : 0.04);
                unilevel += Math.pow(3, g) * VALOR_FIXO * perc;
            }

            let bonus3D = (ptsMensal > ptsAnterior && ptsMensal <= 27500) ? ptsAnterior : 0;
            let ptsCarreira = ptsMensal + bonus3D;

            let pinBonus = 0;
            let ptsPorLinha = ptsCarreira / 3;

            for (let t of tiers) {
                let ptsValidos = 3 * Math.min(ptsPorLinha, t.pts * t.vme);
                if (ptsValidos >= t.pts) pinBonus = t.pin;
            }

            const totalGanhos = unilevel + pinBonus;

            let status = getStatus(e);
            let acao = getAcao(e);

            container.innerHTML += `
                <div class="prosff-card rounded-2xl p-5 border-l-4 ${e === numEtapas ? 'border-l-green-500' : 'border-l-gray-800'}">

                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-black text-gray-500 uppercase">Etapa ${e}</span>
                            <h3 class="text-sm font-bold text-white">${redeAcumulada} consumidores</h3>
                            <p class="text-[10px] text-green-400 uppercase font-bold mt-1">${status}</p>
                        </div>

                        <div class="text-right">
                            <span class="text-[10px] font-bold text-gray-500 block uppercase">Potencial</span>
                            <span class="text-xl font-black green-text">R$ ${Math.floor(totalGanhos).toLocaleString('pt-BR')}</span>
                        </div>
                    </div>

                    <div class="mt-3 border-t border-gray-800 pt-3">
                        <p class="text-[10px] text-gray-400 uppercase">Próximo passo</p>
                        <p class="text-[11px] text-white font-bold">${acao}</p>
                    </div>

                </div>
            `;

            ptsAnterior = ptsMensal;
        }

        container.innerHTML += `
            <div class="prosff-card rounded-2xl p-6 text-center border border-green-500/30 mt-6">
                <p class="text-xs text-gray-400 mb-2 uppercase">Próximo passo real</p>
                <h3 class="text-lg font-black green-text mb-3">Começar sua primeira célula</h3>
                <a href="#" class="bg-green-500 text-black font-bold px-4 py-2 rounded-xl text-sm inline-block">
                    Entrar na Comunidade
                </a>
            </div>

            <p class="text-[10px] text-gray-600 text-center mt-4 uppercase">
                Este simulador mostra cenários de construção. O ritmo depende de cada pessoa.
            </p>
        `;
    }

    simular();
</script>
